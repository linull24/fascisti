<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fascisti Quiz</title><meta name="description" content="历史人物风格匹配小测试。"><style>:root{--bg:#05080A;--panel:#10191C;--panel2:#182629;--text:#DDE8E6;--muted:#7A8C8C;--cyan:#4FD7D7;--cyan-bright:#9AFBFF;--red:#C40000}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"Aldrich","SF Mono",monospace;line-height:1.6}.wrap{max-width:960px;margin:0 auto;padding:40px 20px 80px}.card{background:var(--panel);border:1px solid rgba(79,215,215,.15);box-shadow:0 0 40px rgba(79,215,215,.04),inset 0 0 80px rgba(79,215,215,.015);padding:32px}.hero{text-align:center;padding:64px 24px}.eyebrow{letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-size:12px}.title{font-family:"文瀚建筑体","Noto Serif SC",serif;font-size:clamp(44px,8vw,88px);line-height:.92;margin:20px 0 16px;font-weight:900;color:var(--cyan-bright);text-shadow:0 0 40px rgba(154,251,255,.3)}.btn{appearance:none;border:1px solid rgba(79,215,215,.3);outline:none;background:var(--panel2);color:var(--text);font:inherit;padding:12px 28px;font-size:14px;letter-spacing:.08em;cursor:pointer;margin-top:24px}.btn:hover{border-color:var(--cyan);box-shadow:0 0 16px rgba(79,215,215,.15)}.btn.secondary{background:transparent;border-color:rgba(122,140,140,.3);color:var(--muted)}.progress{height:3px;background:var(--panel2);margin:20px 0 28px;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--cyan-bright));box-shadow:0 0 8px rgba(79,215,215,.5);transition:width .3s}.qtop{display:flex;justify-content:space-between;gap:12px;color:var(--cyan);font-size:13px}.qtop span:last-child{color:var(--muted)}.q{font-family:"锐正","Noto Sans SC",sans-serif;font-size:23px;margin:16px 0 20px}.opts{display:grid;gap:10px}.opt{width:100%;text-align:left;background:var(--panel2);border:1px solid rgba(79,215,215,.08);padding:16px 20px;cursor:pointer;font-family:"锐正","Noto Sans SC",sans-serif;font-size:16px;color:var(--text)}.opt:hover{border-color:var(--cyan);background:rgba(79,215,215,.05)}.result{display:grid;grid-template-columns:minmax(200px,300px) 1fr;gap:30px;align-items:start}.portrait{width:100%;aspect-ratio:3/4;object-fit:cover;border:1px solid rgba(79,215,215,.2);background:var(--panel2)}.name{font-family:"文瀚建筑体","Noto Serif SC",serif;font-size:44px;line-height:1.05;margin:0;font-weight:900;color:var(--cyan-bright)}.meta{color:var(--red);letter-spacing:.06em;margin:8px 0 12px;font-size:14px}.desc{font-family:"锐正","Noto Sans SC",sans-serif;font-size:17px;line-height:1.7}.pillrow{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0}.pill{border:1px solid rgba(79,215,215,.25);padding:4px 12px;color:var(--cyan);font-size:12px;background:rgba(79,215,215,.04)}.scores{margin-top:20px;border-top:1px solid rgba(79,215,215,.1);padding-top:18px;color:var(--muted);font-size:13px}.err{white-space:pre-wrap;background:rgba(196,0,0,.08);border:1px solid rgba(196,0,0,.3);padding:14px;color:var(--red);margin-top:16px;display:none;font-size:13px}.hidden{display:none}@media(max-width:760px){.result{grid-template-columns:1fr}.hero{padding:40px 16px}.card{padding:20px}.name{font-size:34px}.q{font-size:20px}}</style></head><body><div class="wrap"><section id="cover" class="card hero"><div class="eyebrow">historical style matcher</div><h1 class="title">Fascisti Quiz</h1><button class="btn" id="startBtn" type="button">开始测试</button><div class="scores" id="diag"></div><div id="err" class="err"></div></section><section id="quiz" class="card hidden"><div class="qtop"><span id="step"></span><span>选择最接近的一项</span></div><div class="progress"><div class="bar" id="bar"></div></div><h2 class="q" id="qText"></h2><div class="opts" id="opts"></div></section><section id="result" class="card hidden"><div class="result"><img class="portrait" id="rImg" alt=""><div><div class="eyebrow">匹配结果</div><h2 class="name" id="rName"></h2><div class="meta" id="rMeta"></div><p class="desc" id="rDesc"></p><div class="pillrow" id="rTags"></div><div class="scores" id="rScores"></div><button class="btn" id="againBtn" type="button">重新测试</button> <button class="btn secondary" id="copyBtn" type="button">复制结果</button></div></div></section></div><script src="quiz-data-a.js"></script><script src="quiz-data-b.js"></script><script>(()=>{'use strict';const DATA=(window.QUIZ_DATA_A||'')+(window.QUIZ_DATA_B||''),$=id=>document.getElementById(id);let C,Q,IMAGES,idx=0,score=Object.create(null),exposure;async function load(){const bin=Uint8Array.from(atob(DATA),c=>c.charCodeAt(0));const txt=await new Response(new Blob([bin]).stream().pipeThrough(new DecompressionStream('gzip'))).text();const d=JSON.parse(txt);IMAGES=d.I;C=d.C.map(x=>({id:x[0],name:x[1],meta:x[2],tags:x[3],v:x[4],desc:x[5]}));Q=d.Q.map(x=>({q:x[0],o:x[1].map(y=>({text:y[0],tags:y[1]}))}));exposure=buildExposure(Q)}function buildExposure(items){const out=Object.create(null);for(const q of items)for(const opt of q.o)for(const[k,v]of Object.entries(opt.tags||{}))out[k]=(out[k]||0)+Math.abs(v);return out}function add(tags){for(const[k,v]of Object.entries(tags||{}))score[k]=(score[k]||0)+v}function scaled(k,v){return v/Math.sqrt(exposure[k]||1)}function sim(ch){let dot=0,norm=0;for(const[k,v]of Object.entries(ch.v||{})){const cv=scaled(k,v),sv=scaled(k,score[k]||0);dot+=sv*cv;norm+=cv*cv}let s=norm?dot/Math.sqrt(norm):0;if(score[ch.id])s+=4*scaled(ch.id,score[ch.id]);return s}function pick(){const ranked=C.map(ch=>({ch,s:sim(ch)})).sort((x,y)=>y.s-x.s);return{ch:ranked[0].ch,ranked}}function renderQ(){const item=Q[idx];$('step').textContent=`${idx+1} / ${Q.length}`;$('bar').style.width=`${idx/Q.length*100}%`;$('qText').textContent=item.q;const box=$('opts');box.innerHTML='';item.o.forEach(opt=>{const b=document.createElement('button');b.className='opt';b.type='button';b.textContent=opt.text;b.onclick=()=>{add(opt.tags);idx++;idx<Q.length?renderQ():showResult()};box.appendChild(b)})}function showResult(){$('quiz').classList.add('hidden');$('result').classList.remove('hidden');$('bar').style.width='100%';const{ch,ranked}=pick();$('rName').textContent=ch.name;$('rMeta').textContent=ch.meta;$('rDesc').textContent=ch.desc;const img=$('rImg');if(IMAGES[ch.id]){img.style.display='block';img.src=IMAGES[ch.id];img.alt=ch.name;img.onerror=()=>{img.style.display='none'}}else{img.removeAttribute('src');img.alt='';img.style.display='none'}const tags=$('rTags');tags.innerHTML='';ch.tags.forEach(t=>{const p=document.createElement('span');p.className='pill';p.textContent=t;tags.appendChild(p)});$('rScores').textContent='候选前五：'+ranked.slice(0,5).map(x=>`${x.ch.name} ${x.s.toFixed(1)}`).join(' · ')}function reset(){idx=0;score=Object.create(null);$('result').classList.add('hidden');$('quiz').classList.remove('hidden');renderQ()}async function boot(){await load();$('startBtn').onclick=()=>{$('cover').classList.add('hidden');$('quiz').classList.remove('hidden');renderQ()};$('againBtn').onclick=reset;$('copyBtn').onclick=async()=>{const t=`${$('rName').textContent}｜${$('rMeta').textContent}`;try{await navigator.clipboard.writeText(t);$('copyBtn').textContent='已复制'}catch(e){alert(t)}};$('diag').textContent=`人物 ${C.length} · 题目 ${Q.length} · balance: exposure-normalized`}boot().catch(e=>{$('err').style.display='block';$('err').textContent=e.stack||String(e)})})();</script></body></html>
