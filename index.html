let idx=0,score={},answerTexts=[];
function add(t){for(const k in t)score[k]=(score[k]||0)+t[k]}
function sim(c){let s=0;for(const k in c.v)s+=(score[k]||0)*c.v[k];s+=(score[c.id]||0)*4;return s}
function pick(){let arr=C.map(c=>({c,s:sim(c)})).sort((a,b)=>b.s-a.s);let top=arr[0];let raw=score;
 const egg=[['jordan',raw.physics>=2&&raw.random>=1],['teichmuller',raw.math>=1&&raw.map>=2],['kangsheng',raw.archive>=2&&raw.shadow>=2],['yockey',raw.spengler>=2&&raw.book>=2],['limonov',raw.underground>=2&&raw.newspaper>=1],['dugin',raw.map>=2&&raw.eurasia>=1&&raw.mystic>=1],['letov',raw.noise>=1&&raw.punk>=1]];
 for(const [id,on] of egg){if(on){const c=C.find(x=>x.id===id);if(c)return {c,s:top.s,arr}}}return {...top,arr}}
function renderQ(){document.getElementById('step').textContent=`${idx+1} / ${Q.length}`;document.getElementById('bar').style.width=((idx)/Q.length*100)+'%';let q=Q[idx];document.getElementById('qText').textContent=q.q;let box=document.getElementById('opts');box.innerHTML='';q.o.forEach(([txt,tags])=>{let b=document.createElement('button');b.className='opt';b.textContent=txt;b.onclick=()=>{answerTexts.push(txt);add(tags);idx++;if(idx<Q.length)renderQ();else showResult()};box.appendChild(b)})}
function showResult(){document.getElementById('quiz').classList.add('hidden');document.getElementById('result').classList.remove('hidden');document.getElementById('bar').style.width='100%';let {c,arr}=pick();document.getElementById('rName').textContent=c.name;document.getElementById('rMeta').textContent=c.meta;document.getElementById('rDesc').textContent=c.desc;let img=document.getElementById('rImg');img.src=IMAGES[c.id]||'';img.alt=c.name;img.onerror=()=>{img.style.display='none'};let tags=document.getElementById('rTags');tags.innerHTML='';c.tags.forEach(t=>{let p=document.createElement('span');p.className='pill';p.textContent=t;tags.appendChild(p)});document.getElementById('rScores').innerHTML='候选前五：'+arr.slice(0,5).map(x=>`${x.c.name} ${Math.round(x.s)}`).join(' · ')}
document.getElementById('startBtn').onclick=()=>{document.getElementById('cover').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');renderQ()};
document.getElementById('againBtn').onclick=()=>{idx=0;score={};answerTexts=[];document.getElementById('result').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');document.getElementById('rImg').style.display='block';renderQ()};
document.getElementById('copyBtn').onclick=async()=>{const t=document.getElementById('rName').textContent+'｜'+document.getElementById('rMeta').textContent;try{await navigator.clipboard.writeText(t);document.getElementById('copyBtn').textContent='已复制'}catch(e){alert(t)}};
</script>
