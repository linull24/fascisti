<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fascisti Quiz</title>
<meta name="description" content="历史人物风格匹配小测试。">
<style>
/* === SEMANTIC FONT SYSTEM ===
 * 超事件 / Super-Event   → 文瀚建筑体 (title, result name)
 * 国策文本 / Policy Text  → 锐正       (questions, options, descriptions, hints)
 * 终端数据 / Terminal     → Aldrich    (labels, numbers, meta, tags, scores, buttons)
 * === COLOR PALETTE ===
 * bg:#05080A panel:#10191C panel2:#182629
 * text:#DDE8E6 muted:#7A8C8C
 * cyan:#4FD7D7 cyan-bright:#9AFBFF
 * red:#C40000 yellow:#D6B04A green:#70B36A
 */
:root{
  --bg:#05080A;--panel:#10191C;--panel2:#182629;
  --text:#DDE8E6;--muted:#7A8C8C;
  --cyan:#4FD7D7;--cyan-bright:#9AFBFF;
  --red:#C40000;--yellow:#D6B04A;--green:#70B36A
}
*,*::before,*::after{box-sizing:border-box}

/* === BASE === */
body{
  margin:0;background:var(--bg);color:var(--text);
  font-family:"Aldrich","SF Mono","Cascadia Code","Menlo",monospace;
  line-height:1.6;-webkit-font-smoothing:antialiased
}

/* === CRT SCANLINE OVERLAY === */
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);
  pointer-events:none;z-index:9999
}

/* === BORDER GLOW === */
.wrap{max-width:960px;margin:0 auto;padding:40px 20px 80px}

/* === PANEL === */
.card{
  background:var(--panel);border:1px solid rgba(79,215,215,.15);
  box-shadow:0 0 40px rgba(79,215,215,.04),inset 0 0 80px rgba(79,215,215,.015);
  padding:32px
}

/* === HERO / COVER === */
.hero{text-align:center;padding:64px 24px}

/* eyebrow: 终端标签 — Aldrich / muted / 小号大写 */
.eyebrow{
  font-family:"Aldrich","SF Mono",monospace;
  letter-spacing:.22em;text-transform:uppercase;
  color:var(--muted);font-size:12px;font-weight:400
}

/* title: 超事件 — 文瀚建筑体 / cyan-bright / CRT glow */
.title{
  font-family:"文瀚建筑体","WenHanJianZhu","Noto Serif SC","Songti SC",serif;
  font-size:clamp(44px,8vw,88px);line-height:.92;
  margin:20px 0 16px;font-weight:900;
  color:var(--cyan-bright);
  text-shadow:0 0 40px rgba(154,251,255,.3),0 0 80px rgba(154,251,255,.1)
}

/* === BUTTONS === */
.btn{
  appearance:none;border:1px solid rgba(79,215,215,.3);outline:none;
  background:var(--panel2);color:var(--text);
  font-family:"Aldrich","SF Mono",monospace;
  padding:12px 28px;font-size:14px;letter-spacing:.08em;
  cursor:pointer;margin-top:24px;
  transition:border-color .2s,box-shadow .2s
}
.btn:hover{border-color:var(--cyan);box-shadow:0 0 16px rgba(79,215,215,.15)}
.btn:active{background:rgba(79,215,215,.1)}

.btn.secondary{
  background:transparent;border-color:rgba(122,140,140,.3);color:var(--muted)
}
.btn.secondary:hover{border-color:var(--muted);box-shadow:0 0 12px rgba(122,140,140,.1);color:var(--text)}

/* === PROGRESS BAR (terminal style) === */
.progress{
  height:3px;background:var(--panel2);
  margin:20px 0 28px;overflow:hidden
}
.bar{
  height:100%;width:0;
  background:linear-gradient(90deg,var(--cyan),var(--cyan-bright));
  box-shadow:0 0 8px rgba(79,215,215,.5);
  transition:width .3s
}

/* === QUIZ TOP BAR === */
.qtop{
  display:flex;justify-content:space-between;gap:12px;
  font-family:"Aldrich","SF Mono",monospace;
  color:var(--cyan);font-size:13px;letter-spacing:.05em
}
.qtop span:last-child{color:var(--muted)}

/* question: 国策文本 — 锐正 / text color */
.q{
  font-family:"锐正","RuiZheng","Noto Sans SC","Source Han Sans SC","PingFang SC",sans-serif;
  font-size:23px;margin:16px 0 20px;color:var(--text);font-weight:500
}

/* === OPTIONS === */
.opts{display:grid;gap:10px}

/* option: 国策文本 — 锐正 */
.opt{
  width:100%;text-align:left;
  background:var(--panel2);border:1px solid rgba(79,215,215,.08);
  padding:16px 20px;cursor:pointer;
  font-family:"锐正","RuiZheng","Noto Sans SC","Source Han Sans SC","PingFang SC",sans-serif;
  font-size:16px;color:var(--text);
  transition:border-color .15s,background .15s
}
.opt:hover{
  border-color:var(--cyan);background:rgba(79,215,215,.05)
}

/* === RESULT === */
.result{
  display:grid;grid-template-columns:minmax(200px,300px) 1fr;
  gap:30px;align-items:start
}

/* portrait card */
.portrait{
  width:100%;aspect-ratio:3/4;object-fit:cover;
  border:1px solid rgba(79,215,215,.2);
  background:var(--panel2);
  box-shadow:0 0 30px rgba(79,215,215,.06)
}

/* result name: 超事件 — 文瀚建筑体 / cyan-bright glow */
.name{
  font-family:"文瀚建筑体","WenHanJianZhu","Noto Serif SC","Songti SC",serif;
  font-size:44px;line-height:1.05;margin:0;font-weight:900;
  color:var(--cyan-bright);
  text-shadow:0 0 30px rgba(154,251,255,.25)
}

/* result meta: 终端数据 — Aldrich / red */
.meta{
  font-family:"Aldrich","SF Mono",monospace;
  color:var(--red);font-weight:400;letter-spacing:.06em;
  margin:8px 0 12px;font-size:14px
}

/* description: 国策文本 — 锐正 */
.desc{
  font-family:"锐正","RuiZheng","Noto Sans SC","Source Han Sans SC","PingFang SC",sans-serif;
  font-size:17px;color:var(--text);line-height:1.7
}

/* === TAGS === */
.pillrow{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0}

/* tag: 终端数据 — Aldrich / cyan on dark */
.pill{
  font-family:"Aldrich","SF Mono",monospace;
  border:1px solid rgba(79,215,215,.25);
  padding:4px 12px;color:var(--cyan);font-size:12px;
  letter-spacing:.04em;background:rgba(79,215,215,.04)
}

/* === SCORES (terminal output) === */
.scores{
  margin-top:20px;border-top:1px solid rgba(79,215,215,.1);
  padding-top:18px;
  font-family:"Aldrich","SF Mono",monospace;
  color:var(--muted);font-size:13px;letter-spacing:.03em
}

/* === ERROR === */
.err{
  white-space:pre-wrap;background:rgba(196,0,0,.08);
  border:1px solid rgba(196,0,0,.3);padding:14px;
  color:var(--red);margin-top:16px;display:none;
  font-family:"SF Mono","Menlo",monospace;font-size:13px
}

.hidden{display:none}

/* === MOBILE === */
@media(max-width:760px){
  .result{grid-template-columns:1fr}
  .hero{padding:40px 16px}
  .card{padding:20px}
  .name{font-size:34px}.q{font-size:20px}
}
</style>
</head>
<body>
<div class="wrap">
<section id="cover" class="card hero">
  <div class="eyebrow">historical style matcher</div>
  <h1 class="title">Fascisti Quiz</h1>
  <button class="btn" id="startBtn" type="button">开始测试</button>
  <div id="err" class="err"></div>
</section>
<section id="quiz" class="card hidden">
  <div class="qtop"><span id="step"></span><span>选择最接近的一项</span></div>
  <div class="progress"><div class="bar" id="bar"></div></div>
  <h2 class="q" id="qText"></h2>
  <div class="opts" id="opts"></div>
</section>
<section id="result" class="card hidden">
  <div class="result">
    <img class="portrait" id="rImg" alt="">
    <div>
      <div class="eyebrow">匹配结果</div>
      <h2 class="name" id="rName"></h2>
      <div class="meta" id="rMeta"></div>
      <p class="desc" id="rDesc"></p>
      <div class="pillrow" id="rTags"></div>
      <div class="scores" id="rScores"></div>
      <button class="btn" id="againBtn" type="button">重新测试</button>
      <button class="btn secondary" id="copyBtn" type="button">复制结果</button>
    </div>
  </div>
</section>
</div>

function q(text,...opts){return {q:text,o:opts};}
function a(text,tags){return {text,tags};}
let idx = 0;
let score = Object.create(null);
function add(tags){for(const [k,v] of Object.entries(tags)) score[k] = (score[k] || 0) + v;}
function sim(ch){let s=0; for(const [k,v] of Object.entries(ch.v)) s += (score[k] || 0) * v; s += (score[ch.id] || 0) * 4; return s;}
function pick(){
  const ranked = C.map(ch => ({ch, s: sim(ch)})).sort((x,y)=>y.s-x.s);
  const raw = score;
  const eggs = [
    ['jordan', raw.physics>=2 && raw.random>=1],
    ['teichmuller', raw.math>=1 && raw.map>=2],
    ['kangsheng', raw.archive>=2 && raw.shadow>=2],
    ['yockey', raw.spengler>=2 && raw.book>=2],
    ['limonov', raw.underground>=2 && raw.newspaper>=1],
    ['dugin', raw.map>=2 && raw.eurasia>=1 && raw.mystic>=1],
    ['letov', raw.noise>=1 && raw.punk>=1]
  ];
  for(const [id,on] of eggs){ if(on){ const ch = C.find(x=>x.id===id); if(ch) return {ch, ranked}; }}
  return {ch: ranked[0].ch, ranked};
}
function renderQ(){
  const item = Q[idx];
  $('step').textContent = `${idx+1} / ${Q.length}`;
  $('bar').style.width = `${idx / Q.length * 100}%`;
  $('qText').textContent = item.q;
  const box = $('opts'); box.innerHTML = '';
  item.o.forEach(opt => {
    const b = document.createElement('button');
    b.className = 'opt'; b.type = 'button'; b.textContent = opt.text;
    b.addEventListener('click', () => { add(opt.tags); idx++; idx < Q.length ? renderQ() : showResult(); });
    box.appendChild(b);
  });
}
function showResult(){
  $('quiz').classList.add('hidden'); $('result').classList.remove('hidden'); $('bar').style.width = '100%';
  const {ch, ranked} = pick();
  $('rName').textContent = ch.name; $('rMeta').textContent = ch.meta; $('rDesc').textContent = ch.desc;
  const img = $('rImg'); img.style.display = 'block'; img.src = IMAGES[ch.id] || ''; img.alt = ch.name; img.onerror = () => { img.style.display = 'none'; };
  const tags = $('rTags'); tags.innerHTML = ''; ch.tags.forEach(t => { const p = document.createElement('span'); p.className = 'pill'; p.textContent = t; tags.appendChild(p); });
  $('rScores').textContent = '候选前五：' + ranked.slice(0,5).map(x => `${x.ch.name} ${Math.round(x.s)}`).join(' · ');
}
function reset(){idx=0; score=Object.create(null); $('result').classList.add('hidden'); $('quiz').classList.remove('hidden'); renderQ();}
function boot(){
  $('startBtn').addEventListener('click', () => { $('cover').classList.add('hidden'); $('quiz').classList.remove('hidden'); renderQ(); });
  $('againBtn').addEventListener('click', reset);
  $('copyBtn').addEventListener('click', async () => { const t = `${$('rName').textContent}｜${$('rMeta').textContent}`; try{ await navigator.clipboard.writeText(t); $('copyBtn').textContent='已复制'; } catch(e){ alert(t); } });
}
try { boot(); } catch (e) { $('err').style.display='block'; $('err').textContent = e.stack || String(e); }
})();
